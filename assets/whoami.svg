<svg viewBox="0 0 880 280" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Fira Code','SF Mono',Menlo,Consolas,monospace">
  <style>
    text { font-size: 14.5px; }
    .cmd { clip-path: inset(0 100% 0 0); animation: type 0.8s steps(16) 0.3s forwards; }
    @keyframes type { to { clip-path: inset(0 -2% 0 0); } }
    .row { opacity: 0; animation: appear 0.25s ease-out forwards; }
    .r1 { animation-delay: 1.25s; } .r2 { animation-delay: 1.40s; }
    .r3 { animation-delay: 1.55s; } .r4 { animation-delay: 1.70s; }
    .r5 { animation-delay: 1.85s; } .r6 { animation-delay: 2.15s; }
    @keyframes appear { to { opacity: 1; } }
    .cursor { animation: blink 1.1s steps(1) 2.15s infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) {
      .cmd { clip-path: none; animation: none; }
      .row { opacity: 1; animation: none; }
      .cursor { animation: none; }
    }
  </style>

  <!-- window -->
  <rect x="0.5" y="0.5" width="879" height="279" rx="10" fill="#000000" stroke="#1F2428"/>
  <line x1="0.5" y1="40" x2="879.5" y2="40" stroke="#1F2428"/>
  <circle cx="24" cy="20.5" r="6" fill="#FF5F56"/>
  <circle cx="46" cy="20.5" r="6" fill="#FFBD2E"/>
  <circle cx="68" cy="20.5" r="6" fill="#27C93F"/>
  <text x="440" y="26" text-anchor="middle" fill="#5C6370" font-size="13">kayne@github: ~/whoami</text>

  <!-- command -->
  <g class="cmd">
    <text x="28" y="76"><tspan fill="#98C379">$</tspan><tspan fill="#E6EDF3" dx="10">whoami --verbose</tspan></text>
  </g>

  <!-- output -->
  <text x="28" y="112" class="row r1"><tspan fill="#ABB2BF">I build </tspan><tspan fill="#E6EDF3" font-weight="700">agentic AI systems</tspan><tspan fill="#ABB2BF"> and the </tspan><tspan fill="#E6EDF3" font-weight="700">ML infrastructure</tspan><tspan fill="#ABB2BF"> behind them. Right now</tspan></text>

  <text x="28" y="140" class="row r2"><tspan fill="#ABB2BF">that means Shapley value explainability and eval harnesses on payment risk</tspan></text>

  <text x="28" y="168" class="row r3"><tspan fill="#ABB2BF">models at </tspan><tspan fill="#E6EDF3" font-weight="700">Microsoft</tspan><tspan fill="#ABB2BF">. Before that: an enterprise agentic platform at </tspan><tspan fill="#E6EDF3" font-weight="700">IBM</tspan><tspan fill="#ABB2BF">,</tspan></text>

  <text x="28" y="196" class="row r4"><tspan fill="#ABB2BF">a semantic retrieval engine as a founding engineer at </tspan><tspan fill="#E6EDF3" font-weight="700">AdvisorScore</tspan><tspan fill="#ABB2BF">, and</tspan></text>

  <text x="28" y="224" class="row r5"><tspan fill="#ABB2BF">a Numerai model that ranked </tspan><tspan fill="#98C379" font-weight="700">Top 20 in North America</tspan><tspan fill="#ABB2BF">.</tspan></text>

  <!-- next prompt -->
  <g class="row r6">
    <text x="28" y="258" fill="#98C379">$</text>
    <rect x="46" y="246" width="9" height="16" fill="#61AFEF" class="cursor"/>
  </g>
</svg>
